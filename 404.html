<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
<!-- Security headers -->
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; form-action 'self' https://formspree.io; base-uri 'self'; object-src 'none';" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta http-equiv="refresh" content="4; url=/" />
<title>Pagina niet gevonden · NĀRO</title>
<meta name="robots" content="noindex" />

<link rel="icon" type="image/svg+xml" href="/naro-mark-enso-on-black-tile.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/naro-mark-enso-on-black-tile-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/naro-mark-enso-on-black-tile-512.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root{
  --bg:#F5F5F3; --ink:#0A0A0A; --ink-2:#5b5b60; --ink-3:#86868b; --teal:#0E7C66; --teal-ink:#0a6855;
  --display:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;
  --text:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--text);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  padding:24px;text-align:center;line-height:1.5;letter-spacing:-.01em}
a{color:inherit;text-decoration:none}
.box{max-width:34rem}
.logo{height:26px;width:auto;margin:0 auto 40px;display:block}
.code{font-family:var(--display);font-weight:700;color:var(--teal);
  font-size:clamp(64px,12vw,120px);line-height:.9;letter-spacing:-.04em}
h1{font-family:var(--display);font-weight:700;letter-spacing:-.022em;
  font-size:clamp(24px,3.4vw,34px);margin-top:18px}
p{margin-top:14px;color:var(--ink-2);font-size:17px;max-width:30ch;margin-inline:auto}
.cta{margin-top:32px;display:inline-flex;align-items:center;gap:8px;
  padding:13px 26px;background:var(--teal);color:#fff;border-radius:980px;
  font-size:17px;font-weight:500;transition:background .22s ease}
.cta:hover{background:var(--teal-ink)}
.cta:focus-visible{outline:2px solid var(--teal-ink);outline-offset:3px}
.cta:active{transform:translateY(1px)}
.hint{margin-top:18px;font-size:13px;color:var(--ink-3)}
</style>
</head>
<body>
<main class="box">
  <img class="logo" src="/naro-logo.svg" alt="NĀRO" />
  <div class="code">404</div>
  <h1>Deze pagina bestaat niet.</h1>
  <p>De pagina die je zoekt is verplaatst of bestaat niet meer.</p>
  <a class="cta" href="/">Terug naar home</a>
  <p class="hint">Je wordt automatisch doorgestuurd.</p>
</main>
</body>
</html>
